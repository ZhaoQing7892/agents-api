name: E2E Tests

on:
  push:
    branches:
      - master
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}

permissions: read-all

env:
  GO_VERSION: '1.25.0'
  KIND_VERSION: 'v0.22.0'
  KIND_IMAGE: 'kindest/node:v1.32.0'
  KIND_CLUSTER_NAME: 'ci-testing'
  CONTROLLER_IMG: agent-sandbox-controller:latest
  MANAGER_IMG: sandbox-manager:latest
  RUNTIME_IMG: agent-runtime:latest
  CODE_INTERPRETER_IMG: registry-ap-southeast-1.ack.aliyuncs.com/acs/code-interpreter:v1.6

jobs:
  # ============================================================
  # Job 1: SDK CRUD Tests (Go / Java / Python)
  # ============================================================
  sdk-e2e:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sdk: [go, java, python]
    name: SDK E2E (${{ matrix.sdk }})
    steps:
      - name: Checkout agents-api
        uses: actions/checkout@v4

      - name: Checkout openkruise/agents (controller source)
        uses: actions/checkout@v4
        with:
          repository: openkruise/agents
          path: _agents
          ref: master

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Java
        if: matrix.sdk == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Python
        if: matrix.sdk == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Kind Cluster
        uses: helm/kind-action@v1
        with:
          node_image: ${{ env.KIND_IMAGE }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: ./test/kind-conf.yaml
          version: ${{ env.KIND_VERSION }}

      - name: Install CRDs
        run: kubectl apply -f agents/crds/

      - name: Build and deploy controller
        run: |
          cd _agents
          docker build -f dockerfiles/agent-sandbox-controller.Dockerfile --pull --no-cache . -t ${{ env.CONTROLLER_IMG }}
          kind load docker-image --name=${{ env.KIND_CLUSTER_NAME }} ${{ env.CONTROLLER_IMG }}
          CONTROLLER_IMG=${{ env.CONTROLLER_IMG }} make deploy-agent-sandbox-controller

      - name: Wait for controller ready
        run: bash hack/wait-agent-sandbox-controller.sh

      - name: Run SDK E2E Test
        run: |
          chmod +x hack/run-e2e-test.sh
          hack/run-e2e-test.sh --sdk ${{ matrix.sdk }}

  # ============================================================
  # Job 2: E2B SDK Tests (with/without gateway)
  # ============================================================
  e2b-e2e:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: without sandbox-gateway
            with_gateway: false
          - name: with sandbox-gateway
            with_gateway: true
    name: E2B E2E (${{ matrix.name }})
    steps:
      - name: Checkout agents-api
        uses: actions/checkout@v4

      - name: Checkout openkruise/agents (controller source)
        uses: actions/checkout@v4
        with:
          repository: openkruise/agents
          path: _agents
          ref: master

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Kind Cluster
        uses: helm/kind-action@v1
        with:
          node_image: ${{ env.KIND_IMAGE }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: ./test/kind-conf.yaml
          version: ${{ env.KIND_VERSION }}

      - name: Cache Docker images
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: ${{ runner.os }}-docker-${{ env.CODE_INTERPRETER_IMG }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Load external images
        run: |
          if [ -f /tmp/docker-images/code-interpreter.tar ]; then
            echo "Using cached code-interpreter image"
            docker load -i /tmp/docker-images/code-interpreter.tar
          else
            echo "Pulling code-interpreter image: ${CODE_INTERPRETER_IMG}"
            docker pull ${CODE_INTERPRETER_IMG}
            mkdir -p /tmp/docker-images
            docker save ${CODE_INTERPRETER_IMG} -o /tmp/docker-images/code-interpreter.tar
          fi

      - name: Build images from openkruise/agents
        run: |
          cd _agents
          make docker-build-controller
          make docker-build-manager
          make docker-build-runtime

      - name: Load images to Kind
        run: |
          kind load docker-image --name=${KIND_CLUSTER_NAME} ${CONTROLLER_IMG}
          kind load docker-image --name=${KIND_CLUSTER_NAME} ${MANAGER_IMG}
          kind load docker-image --name=${KIND_CLUSTER_NAME} ${RUNTIME_IMG}
          kind load docker-image --name=${KIND_CLUSTER_NAME} ${CODE_INTERPRETER_IMG}

      - name: Build and load gateway image
        if: matrix.with_gateway
        run: |
          cd _agents
          make docker-build-sandbox-gateway
          kind load docker-image --name=${KIND_CLUSTER_NAME} sandbox-gateway:latest

      - name: Deploy components
        run: |
          cd _agents
          make deploy-agent-sandbox-controller
          make deploy-sandbox-manager
          bash ${GITHUB_WORKSPACE}/hack/wait-agent-sandbox-controller.sh

      - name: Deploy sandbox-gateway
        if: matrix.with_gateway
        run: |
          cd _agents
          make deploy-sandbox-gateway

      - name: Run E2B E2E Tests
        run: |
          cd _agents
          export KUBECONFIG=/home/runner/.kube/config
          export E2B_DOMAIN=localhost
          export E2B_API_KEY=some-api-key
          if [ "${{ matrix.with_gateway }}" = "true" ]; then
            bash hack/run-e2b-e2e-test.sh --with-gateway
          else
            bash hack/run-e2b-e2e-test.sh
          fi
