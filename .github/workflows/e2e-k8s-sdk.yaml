name: E2E K8S SDK Tests

on:
  push:
    branches:
      - master
      - main
      - release-*
  pull_request: {}
  workflow_dispatch: {}

permissions: read-all

env:
  GO_VERSION: '1.25.0'
  KIND_VERSION: 'v0.22.0'
  KIND_IMAGE: 'kindest/node:v1.32.0'
  KIND_CLUSTER_NAME: 'ci-testing'
  CONTROLLER_IMG: agent-sandbox-controller:latest

jobs:
  # ============================================================
  # SDK CRUD Tests (Go / Java / Python)
  # ============================================================
  sdk-e2e:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sdk: [go, java, python]
    name: K8S SDK E2E (${{ matrix.sdk }})
    steps:
      - name: Checkout agents-api
        uses: actions/checkout@v4

      - name: Checkout openkruise/agents (controller source)
        uses: actions/checkout@v4
        with:
          repository: openkruise/agents
          path: _agents
          ref: master

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Java
        if: matrix.sdk == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Setup Python
        if: matrix.sdk == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Kind Cluster
        uses: helm/kind-action@v1
        with:
          node_image: ${{ env.KIND_IMAGE }}
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          config: ./test/kind-conf.yaml
          version: ${{ env.KIND_VERSION }}

      - name: Install CRDs
        run: kubectl apply -f agents/crds/

      - name: Build and deploy controller
        run: |
          cd _agents
          docker build -f dockerfiles/agent-sandbox-controller.Dockerfile --pull --no-cache . -t ${{ env.CONTROLLER_IMG }}
          kind load docker-image --name=${{ env.KIND_CLUSTER_NAME }} ${{ env.CONTROLLER_IMG }}
          CONTROLLER_IMG=${{ env.CONTROLLER_IMG }} make deploy-agent-sandbox-controller

      - name: Wait for controller ready
        run: bash hack/wait-agent-sandbox-controller.sh

      - name: Run SDK E2E Test
        run: |
          chmod +x hack/run-k8s-sdk-e2e-test.sh
          hack/run-k8s-sdk-e2e-test.sh --sdk ${{ matrix.sdk }}


